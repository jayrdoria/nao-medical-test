version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ajaia-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    command: sh -c "node_modules/.bin/tsx scripts/seed.ts && node server.js"
